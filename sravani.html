<!DOCTYPE html>
<html>
<head>
    <title>Customer Support Ticket System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #0066cc;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px;
        }

        .module {
            width: 250px;
            background: white;
            border: 2px solid #0066cc;
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            box-shadow: 2px 2px 10px gray;
        }

        .module h2 {
            color: #0066cc;
        }

        button {
            background-color: #0066cc;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #004c99;
        }

        #output {
            width: 85%;
            margin: 20px auto;
            padding: 20px;
            background: white;
            border: 1px solid #0066cc;
            border-radius: 10px;
            min-height: 150px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        table, th, td {
            border: 1px solid #0066cc;
        }

        th {
            background-color: #0066cc;
            color: white;
        }

        th, td {
            padding: 10px;
            text-align: center;
        }

        .chart {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 20px;
            height: 220px;
            margin-top: 20px;
        }

        .bar {
            width: 60px;
            background-color: #28a745;
            color: white;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>
<body>

<header>
    <h1>Customer Support Ticket System</h1>
</header>

<div class="container">

    <!-- Tickets Module -->
    <div class="module">
        <h2>Tickets</h2>
        <p>View support tickets and status.</p>
        <button onclick="showTickets()">Show Tickets</button>
    </div>

    <!-- Charts Module -->
    <div class="module">
        <h2>Charts</h2>
        <p>View ticket statistics.</p>
        <button onclick="showCharts()">Show Charts</button>
    </div>

    <!-- SLA Module -->
    <div class="module">
        <h2>SLA</h2>
        <p>View SLA compliance details.</p>
        <button onclick="showSLA()">Show SLA</button>
    </div>

</div>

<div id="output">
    <h3>Support Dashboard Information Area</h3>
</div>

<script>
    function showTickets() {
        document.getElementById("output").innerHTML =
        `<h3>Support Tickets</h3>
        <table>
            <tr>
                <th>Ticket ID</th>
                <th>Issue</th>
                <th>Status</th>
            </tr>
            <tr>
                <td>T101</td>
                <td>Login Problem</td>
                <td>Open</td>
            </tr>
            <tr>
                <td>T102</td>
                <td>Payment Failure</td>
                <td>In Progress</td>
            </tr>
            <tr>
                <td>T103</td>
                <td>Password Reset</td>
                <td>Resolved</td>
            </tr>
        </table>`;
    }

    function showCharts() {
        document.getElementById("output").innerHTML =
        `<h3>Ticket Statistics</h3>
        <div class="chart">
            <div class="bar" style="height:180px;">18</div>
            <div class="bar" style="height:120px;">12</div>
            <div class="bar" style="height:80px;">8</div>
        </div>
        <p style="text-align:center;">
            Open &nbsp;&nbsp;&nbsp;
            In Progress &nbsp;&nbsp;&nbsp;
            Resolved
        </p>`;
    }

    function showSLA() {
        document.getElementById("output").innerHTML =
        `<h3>SLA Compliance</h3>
        <table>
            <tr>
                <th>Priority</th>
                <th>Response Time</th>
                <th>Status</th>
            </tr>
            <tr>
                <td>High</td>
                <td>1 Hour</td>
                <td>Met</td>
            </tr>
            <tr>
                <td>Medium</td>
                <td>4 Hours</td>
                <td>Met</td>
            </tr>
            <tr>
                <td>Low</td>
                <td>24 Hours</td>
                <td>Pending</td>
            </tr>
        </table>`;
    }
</script>

</body>
</html>
